<!DOCTYPE html>
<html>
<head>
    <title>Crop Prediction System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #f4f7fc;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .result-box {
            background: #198754;
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">

    <div class="row justify-content-center">

        <div class="col-md-10">

            <div class="card p-4">

                <h1 class="text-center mb-4">
                    Crop Recommendation System
                </h1>

                <form method="POST">
                    {% csrf_token %}

                    <div class="row">

                        <div class="col-md-4 mb-3">
                            <label>Nitrogen (N)</label>
                            <input type="number" step="any" class="form-control" name="N" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Phosphorus (P)</label>
                            <input type="number" step="any" class="form-control" name="P" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Potassium (K)</label>
                            <input type="number" step="any" class="form-control" name="K" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Temperature</label>
                            <input type="number" step="any" class="form-control" name="temperature" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Humidity</label>
                            <input type="number" step="any" class="form-control" name="humidity" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>pH</label>
                            <input type="number" step="any" class="form-control" name="ph" required>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label>Rainfall</label>
                            <input type="number" step="any" class="form-control" name="rainfall" required>
                        </div>

                    </div>

                    <div class="text-center mt-3">
                        <button class="btn btn-success btn-lg">
                            Predict Crop
                        </button>
                    </div>

                </form>

            </div>

            {% if prediction %}

            <div class="card p-4 mt-4">

                <h2 class="mb-4 text-center">
                    Prediction Result
                </h2>

                <div class="result-box">
                    Recommended Crop: {{ prediction }}
                </div>

            </div>

            <div class="card p-4 mt-4">

                <h2 class="text-center mb-4">
                    Input Data Table
                </h2>

                <table class="table table-bordered table-striped">
                    <thead>
                        <tr>
                            <th>Parameter</th>
                            <th>Value</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for key, value in input_values.items %}
                        <tr>
                            <td>{{ key }}</td>
                            <td>{{ value }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>

            </div>

            <div class="card p-4 mt-4 mb-5">

                <h2 class="text-center mb-4">
                    Soil Analysis Graph
                </h2>

                <canvas id="myChart"></canvas>

            </div>

            {% endif %}

        </div>

    </div>

</div>

{% if prediction %}
<script>

const chartData = {{ chart_data|safe }};

const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: [
            'N',
            'P',
            'K',
            'Temperature',
            'Humidity',
            'pH',
            'Rainfall'
        ],
        datasets: [{
            label: 'Input Values',
            data: chartData,
            borderWidth: 1
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

</script>
{% endif %}

</body>
</html>
